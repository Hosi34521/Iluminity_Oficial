<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="0; url=./en.html" />
  <title>Iluminity Inc.</title>
  <script>
    (function () {
      try {
        const queryLanguage = new URLSearchParams(window.location.search).get("lang");
        const savedLanguage = localStorage.getItem("iluminity-language");
        const languages = (navigator.languages && navigator.languages.length ? navigator.languages : [navigator.language || ""])
          .join(",")
          .toLowerCase();

        let target = "en.html";

        if (queryLanguage === "es") {
          target = "es.html";
        } else if (queryLanguage === "en") {
          target = "en.html";
        } else if (savedLanguage === "es") {
          target = "es.html";
        } else if (savedLanguage === "en") {
          target = "en.html";
        } else if (languages.includes("es")) {
          target = "es.html";
        }

        window.location.replace("./" + target);
      } catch (error) {
        window.location.replace("./en.html");
      }
    })();
  </script>
</head>
<body>
  <p>Redirecting to Iluminity...</p>
</body>
</html>
